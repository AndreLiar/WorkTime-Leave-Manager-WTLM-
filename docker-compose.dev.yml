version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wtlm-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: wtlm_user
      POSTGRES_PASSWORD: wtlm_password
      POSTGRES_DB: wtlm_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wtlm_user -d wtlm_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
