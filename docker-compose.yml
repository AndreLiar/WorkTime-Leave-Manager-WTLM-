version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wtlm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wtlm_user
      POSTGRES_PASSWORD: wtlm_password
      POSTGRES_DB: wtlm_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wtlm_user -d wtlm_db']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wtlm-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wtlm_user:wtlm_password@postgres:5432/wtlm_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  postgres_data:
