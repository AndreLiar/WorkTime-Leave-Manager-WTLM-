name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - dev
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Single job for small teams - runs all checks in sequence
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wtlm_user
          POSTGRES_PASSWORD: wtlm_password
          POSTGRES_DB: wtlm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      # 1. Setup
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # 2. Code Quality
      - name: 🔍 TypeScript check
        run: npm run ts

      - name: 🎨 ESLint
        run: npm run lint

      # 3. Tests
      - name: 🧪 Unit tests
        run: npm run test:unit

      # 4. Build
      - name: 🏗️ Build application
        run: npm run build

      # 5. Security Scans (lightweight for small teams)
      - name: 🔒 npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # 6. Integration Tests (only if not PR to main)
      - name: 🚀 Start application
        if: github.base_ref != 'main'
        env:
          DATABASE_URL: postgresql://wtlm_user:wtlm_password@localhost:5432/wtlm_db
          NODE_ENV: test
        run: |
          npm run prisma:generate
          npm run prisma:migrate:deploy
          npm run start &
          echo $! > server.pid
          sleep 10

      - name: ✅ Integration tests
        if: github.base_ref != 'main'
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'
          newman run WorkTime-Leave-Manager.postman_collection.json \
            --env-var "baseUrl=http://localhost:3000" \
            --reporters cli

      - name: 🛑 Stop application
        if: always() && github.base_ref != 'main'
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      # 7. PR Comment with summary
      - name: 💬 Comment PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ github.base_ref }}';
            const result = '${{ job.status }}';
            const emoji = result === 'success' ? '✅' : '❌';
            
            let body = `## ${emoji} CI Pipeline Results\n\n`;
            body += `**Target branch:** \`${target}\`\n`;
            body += `**Status:** ${result}\n\n`;
            body += `### Checks Performed:\n`;
            body += `- ✅ TypeScript validation\n`;
            body += `- ✅ ESLint checks\n`;
            body += `- ✅ Unit tests\n`;
            body += `- ✅ Build verification\n`;
            body += `- ✅ Security audit\n`;
            
            if (target !== 'main') {
              body += `- ✅ Integration tests\n`;
            }
            
            body += `\n---\n`;
            body += `🔗 [View detailed logs](${context.payload.pull_request.html_url}/checks)\n`;
            
            if (result === 'success') {
              body += `\n✅ **All checks passed!** Ready for review.\n`;
            } else {
              body += `\n❌ **Some checks failed.** Please fix and push again.\n`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
