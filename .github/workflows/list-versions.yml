name: List Available Versions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List recent versions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 AVAILABLE VERSIONS FOR ROLLBACK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Recent version tags (last 20):"
          echo ""
          
          git tag --sort=-creatordate | head -20 | while read tag; do
            COMMIT=$(git rev-parse "$tag")
            DATE=$(git log -1 --format=%ai "$tag" | cut -d' ' -f1,2)
            MESSAGE=$(git log -1 --format=%s "$tag")
            echo "📦 $tag"
            echo "   Commit: $COMMIT"
            echo "   Date: $DATE"
            echo "   Message: $MESSAGE"
            echo ""
          done
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "To rollback to a specific version:"
          echo "  1. Go to Actions → Rollback Deployment"
          echo "  2. Click 'Run workflow'"
          echo "  3. Enter the version tag (e.g., 2026.03.05-abc1234)"
          echo "  4. Provide a rollback reason"
          echo "  5. Click 'Run workflow'"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: List recent commits
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 RECENT COMMITS (last 10)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          git log --oneline --decorate -10
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
