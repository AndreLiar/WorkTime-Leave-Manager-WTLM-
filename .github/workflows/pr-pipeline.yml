name: PR Pipeline

on:
  pull_request:
    branches:
      - dev
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Job 1: Code Quality & Security Checks
  quality-checks:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run ts

      - name: Run ESLint
        run: npm run lint --max-warnings=0
        continue-on-error: false

      - name: Check code formatting
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # Job 3: Build & Container Security
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: worktime-leave-manager:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worktime-leave-manager:pr-${{ github.event.pull_request.number }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worktime-leave-manager:pr-${{ github.event.pull_request.number }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # Job 4: Dependency Security Scan
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk security scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            snyk test --severity-threshold=high || true
          else
            echo "⚠️ SNYK_TOKEN not set, skipping Snyk scan"
          fi
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

  # Job 5: SAST (Static Application Security Testing)
  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # Job 6: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wtlm_user
          POSTGRES_PASSWORD: wtlm_password
          POSTGRES_DB: wtlm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://wtlm_user:wtlm_password@localhost:5432/wtlm_db
        run: npm run prisma:migrate:deploy

      - name: Build application
        run: npm run build

      - name: Start application in background
        env:
          DATABASE_URL: postgresql://wtlm_user:wtlm_password@localhost:5432/wtlm_db
          NODE_ENV: test
        run: |
          npm run start &
          echo $! > server.pid
          sleep 10

      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'

      - name: Run integration tests with Newman
        run: |
          newman run WorkTime-Leave-Manager.postman_collection.json \
            --env-var "baseUrl=http://localhost:3000" \
            --reporters cli,json \
            --reporter-json-export test-results.json

      - name: Stop application
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results.json

  # Job 7: PR Summary & Status
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-and-scan, dependency-scan, sast-scan, integration-tests]
    if: always()
    
    steps:
      - name: Generate PR Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobs = [
              { name: 'Code Quality', result: '${{ needs.quality-checks.result }}' },
              { name: 'Unit Tests', result: '${{ needs.unit-tests.result }}' },
              { name: 'Build & Security Scan', result: '${{ needs.build-and-scan.result }}' },
              { name: 'Dependency Scan', result: '${{ needs.dependency-scan.result }}' },
              { name: 'SAST Scan', result: '${{ needs.sast-scan.result }}' },
              { name: 'Integration Tests', result: '${{ needs.integration-tests.result }}' }
            ];
            
            const getEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              if (result === 'cancelled') return '⚠️';
              return '⏭️';
            };
            
            let summary = '## 🔍 PR Pipeline Results\n\n';
            summary += '| Job | Status |\n';
            summary += '|-----|--------|\n';
            
            jobs.forEach(job => {
              summary += `| ${job.name} | ${getEmoji(job.result)} ${job.result} |\n`;
            });
            
            summary += '\n---\n';
            summary += `🔗 [View detailed logs](${context.payload.pull_request.html_url}/checks)\n`;
            
            const allSuccess = jobs.every(job => job.result === 'success');
            
            if (allSuccess) {
              summary += '\n✅ **All checks passed!** This PR is ready for review.\n';
            } else {
              summary += '\n❌ **Some checks failed.** Please review and fix the issues.\n';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summary
            });

      - name: Check if all jobs succeeded
        run: |
          if [ "${{ needs.quality-checks.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.build-and-scan.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.sast-scan.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ One or more jobs failed"
            exit 1
          else
            echo "✅ All jobs succeeded"
          fi
