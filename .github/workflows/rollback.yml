name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g., 2026.03.05-abc1234 or git SHA)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: false
        type: string
        default: 'Manual rollback requested'

permissions:
  contents: read
  packages: write

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "🔍 Validating version/commit: $VERSION"
          
          # Check if it's a tag
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            COMMIT_SHA=$(git rev-parse "$VERSION")
            echo "✅ Found tag/commit: $VERSION"
            echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
            echo "version_tag=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "❌ Version/commit not found: $VERSION"
            echo ""
            echo "Available recent tags:"
            git tag --sort=-creatordate | head -10
            exit 1
          fi

      - name: Checkout target version
        run: |
          git checkout ${{ steps.validate.outputs.commit_sha }}
          echo "✅ Checked out commit: ${{ steps.validate.outputs.commit_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          echo "image_name=ghcr.io/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Check if Docker image exists
        id: check_image
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${{ steps.prep.outputs.image_name }}"
          
          echo "🔍 Checking if Docker image exists for version: $VERSION"
          
          # Try to pull the image
          if docker pull "$IMAGE:$VERSION" 2>/dev/null; then
            echo "✅ Docker image found: $IMAGE:$VERSION"
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "use_existing=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Docker image not found for version: $VERSION"
            echo "🔨 Will rebuild from source code"
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "use_existing=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image (if needed)
        if: steps.check_image.outputs.use_existing == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:${{ github.event.inputs.version }}
            ${{ steps.prep.outputs.image_name }}:rollback-${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy rollback to Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK is not set"
            echo "Cannot trigger rollback without deploy hook"
            exit 1
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 ROLLBACK DEPLOYMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Version: ${{ github.event.inputs.version }}"
          echo "📝 Reason: ${{ github.event.inputs.reason }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -f -s -X POST "$RENDER_DEPLOY_HOOK")
          echo "$RESPONSE"
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.deploy.id // empty')
          
          if [ -z "$DEPLOY_ID" ]; then
            echo "⚠️ Could not extract deployment ID from response"
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "✅ Rollback deployment triggered successfully"
          echo "📦 Deployment ID: $DEPLOY_ID"

      - name: Wait for rollback deployment
        if: steps.deploy.outputs.deploy_id != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ RENDER_API_KEY or RENDER_SERVICE_ID not set"
            echo "Cannot monitor rollback status"
            echo "Please check Render dashboard manually"
            exit 0
          fi
          
          echo "⏳ Monitoring rollback deployment..."
          echo "📦 Deployment ID: $DEPLOY_ID"
          echo ""
          
          MAX_ATTEMPTS=60
          ATTEMPT=0
          WAIT_TIME=15
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            sleep $WAIT_TIME
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * WAIT_TIME))
            
            echo "🔍 [$ELAPSED s] Checking rollback status (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            
            STATUS_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
            
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // "unknown"')
            echo "   Status: $STATUS"
            
            if [ "$STATUS" = "live" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✅ ROLLBACK SUCCESSFUL!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📦 Rolled back to: ${{ github.event.inputs.version }}"
              echo "⏱️  Rollback time: $ELAPSED seconds"
              echo "👤 Requested by: ${{ github.actor }}"
              echo "📝 Reason: ${{ github.event.inputs.reason }}"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ] || [ "$STATUS" = "deactivated" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "❌ ROLLBACK FAILED!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Status: $STATUS"
              echo "📦 Attempted version: ${{ github.event.inputs.version }}"
              echo ""
              echo "Response details:"
              echo "$STATUS_RESPONSE" | jq '.'
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            fi
          done
          
          echo ""
          echo "❌ Rollback verification timeout after $((MAX_ATTEMPTS * WAIT_TIME)) seconds"
          echo "Check Render dashboard: https://dashboard.render.com/"
          exit 1

      - name: Verify rollback with smoke tests
        if: success()
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          echo "🧪 Running smoke tests on rolled back version..."
          APP_URL="${RENDER_APP_URL:-https://worktime-leave-manager-wtlm.onrender.com}"
          
          sleep 10
          
          echo "✓ Testing health endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/health" | jq -e '.status == "ok"' > /dev/null; then
            echo "  ✅ Health check passed"
          else
            echo "  ⚠️  Health check failed - application may still be starting"
          fi
          
          echo "✓ Testing leave requests endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/leave-requests" | jq -e 'type == "array"' > /dev/null; then
            echo "  ✅ Leave requests endpoint working"
          else
            echo "  ⚠️  Leave requests endpoint failed"
          fi
          
          echo ""
          echo "✅ Rollback verification complete"

      - name: Create rollback summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 ROLLBACK SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Commit: ${{ steps.validate.outputs.commit_sha }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
