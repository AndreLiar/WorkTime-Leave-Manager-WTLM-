name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - rollback
          - list-versions
        default: deploy
      version:
        description: 'Version to rollback to (only for rollback action)'
        required: false
        type: string
      reason:
        description: 'Reason for rollback (only for rollback action)'
        required: false
        type: string
        default: 'Manual rollback requested'

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  # Determine which action to run
  determine-action:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.set-action.outputs.action }}
    steps:
      - id: set-action
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "🚀 Triggered by push - running deployment"
          else
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
            echo "🔧 Manual trigger - running: ${{ inputs.action }}"
          fi

  # Job 1: Deploy (automatic on push or manual)
  # Job 1: Deploy (automatic on push or manual)
  deploy:
    needs: determine-action
    if: needs.determine-action.outputs.action == 'deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Generated version: $VERSION"
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "⚠️  Tag $VERSION already exists, skipping tag creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "✅ Created and pushed tag: $VERSION"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          echo "image_name=ghcr.io/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_name }}
          tags: |
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK is not set. Skipping Render deployment."
            echo "ℹ️ To enable automatic deployment, add RENDER_DEPLOY_HOOK secret to your repository."
            exit 0
          fi
          
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -f -s -X POST "$RENDER_DEPLOY_HOOK")
          echo "$RESPONSE"
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.deploy.id // empty')
          
          if [ -z "$DEPLOY_ID" ]; then
            echo "⚠️ Could not extract deployment ID from response"
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          echo "✅ Render deployment triggered successfully"
          echo "📦 Deployment ID: $DEPLOY_ID"
          
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            echo "use_api=true" >> $GITHUB_OUTPUT
          else
            echo "use_api=false" >> $GITHUB_OUTPUT
            echo "⚠️ RENDER_API_KEY or RENDER_SERVICE_ID not set - will use health check fallback"
          fi
      
      - name: Wait for deployment (Render API)
        if: steps.deploy.outputs.deploy_id != '' && steps.deploy.outputs.use_api == 'true'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          echo "⏳ Polling Render API for deployment status..."
          echo "📦 Deployment ID: $DEPLOY_ID"
          echo "🔧 Service ID: $RENDER_SERVICE_ID"
          echo ""
          echo "⚠️  Note: Render deployments can take 5-10 minutes for Docker builds"
          echo ""
          
          MAX_ATTEMPTS=80
          ATTEMPT=0
          WAIT_TIME=15
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            sleep $WAIT_TIME
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * WAIT_TIME))
            
            echo "🔍 [$ELAPSED s] Polling deployment status (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            
            STATUS_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
            
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // "unknown"')
            
            echo "   Status: $STATUS"
            
            if [ "$STATUS" = "live" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✅ Deployment successful! Status: LIVE"
              echo "📦 Deployment ID: $DEPLOY_ID"
              echo "⏱️  Total deployment time: $ELAPSED seconds"
              echo ""
              echo "🎯 Your service is now live on Render!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            elif [ "$STATUS" = "deactivated" ]; then
              echo "⚠️  Deployment $DEPLOY_ID was deactivated (superseded by a newer deploy)."
              echo "🔍 Switching to latest deployment on the service..."
              LATEST_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1")
              DEPLOY_ID=$(echo "$LATEST_RESPONSE" | jq -r '.[0].id // empty')
              STATUS=$(echo "$LATEST_RESPONSE" | jq -r '.[0].status // "unknown"')
              echo "📦 New Deployment ID: $DEPLOY_ID | Status: $STATUS"
              if [ "$STATUS" = "live" ]; then
                echo "✅ Latest deployment is already LIVE!"
                exit 0
              fi
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "❌ Deployment failed with status: $STATUS"
              echo "📦 Deployment ID: $DEPLOY_ID"
              echo ""
              echo "Response details:"
              echo "$STATUS_RESPONSE" | jq '.'
              echo ""
              echo "Next steps:"
              echo "  1. Check Render dashboard: https://dashboard.render.com/"
              echo "  2. View deployment logs for error details"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            fi
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ Deployment verification timeout!"
          echo "⏱️  Timeout after $((MAX_ATTEMPTS * WAIT_TIME)) seconds (20 minutes)"
          echo "📦 Last known status: $STATUS"
          echo ""
          echo "The deployment may still be in progress. Check:"
          echo "  • Render dashboard: https://dashboard.render.com/"
          echo "  • Service logs for more details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
      
      - name: Wait for deployment (Health Check Fallback)
        if: steps.deploy.outputs.deploy_id != '' && steps.deploy.outputs.use_api == 'false'
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_APP_URL" ]; then
            echo "⚠️ RENDER_APP_URL not set!"
            echo "❌ Cannot verify deployment without API key or app URL."
            echo ""
            echo "Please add one of the following to your repository secrets:"
            echo "  Option 1 (Recommended): RENDER_API_KEY + RENDER_SERVICE_ID"
            echo "  Option 2 (Fallback): RENDER_APP_URL"
            exit 1
          fi
          
          echo "⏳ Using health check fallback method..."
          echo "📦 Deployment ID: ${{ steps.deploy.outputs.deploy_id }}"
          echo "🌐 Target URL: $RENDER_APP_URL"
          echo ""
          echo "⚠️  WARNING: This method may report success prematurely!"
          echo "⚠️  It checks if ANY version responds, not specifically the new deployment."
          echo "⚠️  For accurate status, add RENDER_API_KEY and RENDER_SERVICE_ID secrets."
          echo ""
          
          MAX_ATTEMPTS=80
          ATTEMPT=0
          WAIT_TIME=15
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            sleep $WAIT_TIME
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * WAIT_TIME))
            echo "🔍 [$ELAPSED s] Checking health endpoint (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            
            if curl -f -s --max-time 10 "$RENDER_APP_URL/health" > /dev/null 2>&1; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✅ Health check passed! App is responding."
              echo "🌐 App URL: $RENDER_APP_URL"
              echo "⏱️  Elapsed time: $ELAPSED seconds"
              echo ""
              echo "⚠️  Note: This confirms the app responds, but may not be the new version yet."
              echo "   Check Render dashboard to confirm deployment completion."
              echo ""
              echo "🎯 Test your endpoints:"
              echo "   • Health check: $RENDER_APP_URL/health"
              echo "   • Leave requests: $RENDER_APP_URL/leave-requests"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            fi
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ Health check timeout!"
          echo "⏱️  Timeout after $((MAX_ATTEMPTS * WAIT_TIME)) seconds"
          echo "🌐 App URL: $RENDER_APP_URL"
          echo ""
          echo "Next steps:"
          echo "  1. Check Render dashboard: https://dashboard.render.com/"
          echo "  2. View deployment logs for errors"
          echo "  3. Manually test: $RENDER_APP_URL/health"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
      
      - name: Run smoke tests
        if: steps.deploy.outputs.deploy_id != ''
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          echo "🧪 Running smoke tests on deployed application..."
          echo "🌐 Target URL: ${RENDER_APP_URL:-https://worktime-leave-manager-wtlm.onrender.com}"
          echo ""
          
          APP_URL="${RENDER_APP_URL:-https://worktime-leave-manager-wtlm.onrender.com}"
          
          # Test 1: Health Check
          echo "✓ Test 1: Health endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/health" | jq -e '.status == "ok"' > /dev/null; then
            echo "  ✅ Health check passed"
          else
            echo "  ❌ Health check failed"
            exit 1
          fi
          
          # Test 2: Root endpoint
          echo "✓ Test 2: Root endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/" > /dev/null; then
            echo "  ✅ Root endpoint accessible"
          else
            echo "  ❌ Root endpoint failed"
            exit 1
          fi
          
          # Test 3: Leave requests endpoint (GET)
          echo "✓ Test 3: Leave requests list endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/leave-requests" | jq -e 'type == "array"' > /dev/null; then
            echo "  ✅ Leave requests endpoint working"
          else
            echo "  ❌ Leave requests endpoint failed"
            exit 1
          fi
          
          # Test 4: Statistics endpoint
          echo "✓ Test 4: Statistics endpoint..."
          if curl -f -s --max-time 10 "$APP_URL/leave-requests/statistics" | jq -e '.total != null' > /dev/null; then
            echo "  ✅ Statistics endpoint working"
          else
            echo "  ❌ Statistics endpoint failed"
            exit 1
          fi

          # Test 5: Redis cache verification (call twice, second should be faster)
          echo "✓ Test 5: Redis cache verification..."
          T1=$(date +%s%3N)
          curl -f -s --max-time 10 "$APP_URL/leave-requests" > /dev/null
          T2=$(date +%s%3N)
          curl -f -s --max-time 10 "$APP_URL/leave-requests" > /dev/null
          T3=$(date +%s%3N)
          FIRST=$((T2 - T1))
          SECOND=$((T3 - T2))
          echo "  First call: ${FIRST}ms | Second call (cached): ${SECOND}ms"
          echo "  ✅ Cache layer responding"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All smoke tests passed!"
          echo "🎯 Deployment version: ${{ steps.version.outputs.version }}"
          echo "🌐 Application URL: $APP_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🔧 Setup Node.js for seed
        if: steps.deploy.outputs.deploy_id != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 🌱 Seed database
        if: steps.deploy.outputs.deploy_id != ''
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          echo "🌱 Running Prisma seed against production database..."
          npm ci --silent
          npm run prisma:generate
          npm run prisma:seed
          echo "✅ Database seeded successfully"

      - name: Run K6 load tests
        if: steps.deploy.outputs.deploy_id != ''
        continue-on-error: true
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js
        env:
          BASE_URL: ${{ secrets.RENDER_APP_URL }}

      - name: Run E2E regression suite
        if: steps.deploy.outputs.deploy_id != ''
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          echo "🧪 Running E2E regression suite against live environment..."
          APP_URL="${RENDER_APP_URL:-https://worktime-leave-manager-wtlm.onrender.com}"
          echo "🌐 Target: $APP_URL"
          echo ""

          npm install -g newman --silent

          newman run test/e2e/regression-collection.json \
            --env-var "baseUrl=$APP_URL" \
            --reporters cli \
            --bail

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ E2E regression suite passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Store deployment info for rollback
        if: success()
        run: |
          echo "deployment_success=true" >> $GITHUB_OUTPUT
          echo "deployed_version=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "deployed_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        id: deployment_result

  # Job 2: Automatic Rollback on Failure
  auto-rollback:
    needs: deploy
    if: failure() && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: 🚨 Deployment failed - Starting automatic rollback
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚨 AUTOMATIC ROLLBACK TRIGGERED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reason: Deployment or smoke tests failed"
          echo "Failed SHA: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find last successful deployment
        id: find_last_version
        run: |
          echo "🔍 Finding last successful deployment version..."
          
          # Get all version tags sorted by date (newest first)
          TAGS=$(git tag --sort=-creatordate | grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-' | head -10)
          
          echo "Recent version tags:"
          echo "$TAGS"
          
          # Get the most recent tag (excluding current failed one)
          CURRENT_SHA="${{ github.sha }}"
          CURRENT_SHORT_SHA=$(echo $CURRENT_SHA | cut -c1-7)
          
          LAST_VERSION=""
          for tag in $TAGS; do
            TAG_SHA=$(git rev-parse "$tag^{commit}")
            TAG_SHORT_SHA=$(echo $TAG_SHA | cut -c1-7)
            
            # Skip if this is the current failed deployment
            if [ "$TAG_SHORT_SHA" != "$CURRENT_SHORT_SHA" ]; then
              LAST_VERSION="$tag"
              echo "✅ Found last stable version: $LAST_VERSION"
              echo "   Commit: $TAG_SHA"
              break
            fi
          done
          
          if [ -z "$LAST_VERSION" ]; then
            echo "❌ No previous version found for rollback!"
            exit 1
          fi
          
          echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          echo "last_commit=$(git rev-parse $LAST_VERSION)" >> $GITHUB_OUTPUT

      - name: Checkout last stable version
        run: |
          git checkout ${{ steps.find_last_version.outputs.last_commit }}
          echo "✅ Checked out last stable version: ${{ steps.find_last_version.outputs.last_version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          echo "image_name=ghcr.io/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Check if rollback image exists
        id: check_image
        run: |
          VERSION="${{ steps.find_last_version.outputs.last_version }}"
          IMAGE="${{ steps.prep.outputs.image_name }}"
          
          echo "🔍 Checking if Docker image exists: $IMAGE:$VERSION"
          
          if docker pull "$IMAGE:$VERSION" 2>/dev/null; then
            echo "✅ Found existing image for version: $VERSION"
            echo "use_existing=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Image not found, will rebuild from source"
            echo "use_existing=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push rollback image (if needed)
        if: steps.check_image.outputs.use_existing == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:${{ steps.find_last_version.outputs.last_version }}
            ${{ steps.prep.outputs.image_name }}:rollback-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render rollback deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK not set - cannot rollback"
            exit 1
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 DEPLOYING ROLLBACK VERSION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Rolling back to: ${{ steps.find_last_version.outputs.last_version }}"
          echo "Commit: ${{ steps.find_last_version.outputs.last_commit }}"
          echo "Reason: Automatic rollback after deployment failure"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          RESPONSE=$(curl -f -s -X POST "$RENDER_DEPLOY_HOOK")
          echo "$RESPONSE"
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.deploy.id // empty')
          echo "✅ Rollback deployment triggered"
          echo "📦 Deployment ID: $DEPLOY_ID"

      - name: Wait for rollback deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            echo "⏳ Monitoring rollback deployment..."
            sleep 30
            echo "✅ Rollback initiated. Check Render dashboard for status."
          else
            echo "⚠️  API key not set, cannot monitor rollback"
            echo "Check Render dashboard: https://dashboard.render.com/"
          fi

      - name: Rollback notification
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 AUTOMATIC ROLLBACK SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Failed deployment: ${{ github.sha }}"
          echo "Rolled back to: ${{ steps.find_last_version.outputs.last_version }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""
          echo "⚠️  ACTION REQUIRED:"
          echo "  1. Check Render dashboard for rollback status"
          echo "  2. Investigate deployment failure"
          echo "  3. Fix issues before next deployment"
          echo "  4. Review logs: https://dashboard.render.com/"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Create issue for failed deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Automatic Rollback: Deployment Failed',
              body: `## 🚨 Automatic Rollback Triggered
            
            **Failed Deployment:**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Trigger: ${{ github.event_name }}
            - Timestamp: ${new Date().toISOString()}
            
            **Rollback Details:**
            - Rolled back to: \`${{ steps.find_last_version.outputs.last_version }}\`
            - Previous commit: ${{ steps.find_last_version.outputs.last_commit }}
            
            **Action Required:**
            1. ✅ Automatic rollback has been triggered
            2. 🔍 Investigate the failure in [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})
            3. 🔧 Fix the issues
            4. 🧪 Test thoroughly before next deployment
            
            **Links:**
            - [Failed workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})
            - [Render dashboard](https://dashboard.render.com/)
            - [Failed commit](${context.payload.repository.html_url}/commit/${{ github.sha }})
            
            **Next Steps:**
            - Review deployment logs
            - Check smoke test failures
            - Verify application health
            - Plan fix and redeployment`,
              labels: ['deployment-failure', 'auto-rollback', 'urgent']
            });
            
            console.log('Created issue:', issue.data.html_url);

  # Job 3: Manual Rollback
  # Job 3: Manual Rollback
  rollback:
    needs: determine-action
    if: needs.determine-action.outputs.action == 'rollback'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          echo "🔍 Validating version/commit: $VERSION"
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            COMMIT_SHA=$(git rev-parse "$VERSION")
            echo "✅ Found tag/commit: $VERSION"
            echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
            echo "version_tag=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "❌ Version/commit not found: $VERSION"
            echo ""
            echo "Available recent tags:"
            git tag --sort=-creatordate | head -10
            exit 1
          fi

      - name: Checkout target version
        run: |
          git checkout ${{ steps.validate.outputs.commit_sha }}
          echo "✅ Checked out commit: ${{ steps.validate.outputs.commit_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | sed 's/-$//')
          echo "image_name=ghcr.io/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Check if Docker image exists
        id: check_image
        run: |
          VERSION="${{ inputs.version }}"
          IMAGE="${{ steps.prep.outputs.image_name }}"
          
          echo "🔍 Checking if Docker image exists for version: $VERSION"
          
          if docker pull "$IMAGE:$VERSION" 2>/dev/null; then
            echo "✅ Docker image found: $IMAGE:$VERSION"
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "use_existing=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Docker image not found for version: $VERSION"
            echo "🔨 Will rebuild from source code"
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "use_existing=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image (if needed)
        if: steps.check_image.outputs.use_existing == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:${{ inputs.version }}
            ${{ steps.prep.outputs.image_name }}:rollback-${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy rollback to Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK is not set"
            exit 1
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 ROLLBACK DEPLOYMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Version: ${{ inputs.version }}"
          echo "📝 Reason: ${{ inputs.reason }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -f -s -X POST "$RENDER_DEPLOY_HOOK")
          echo "$RESPONSE"
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.deploy.id // empty')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "✅ Rollback deployment triggered"

      - name: Rollback summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 ROLLBACK SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ inputs.version }}"
          echo "Commit: ${{ steps.validate.outputs.commit_sha }}"
          echo "Reason: ${{ inputs.reason }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # Job 4: List Versions (manual only)
  list-versions:
    needs: determine-action
    if: needs.determine-action.outputs.action == 'list-versions'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List recent versions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 AVAILABLE VERSIONS FOR ROLLBACK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
